name: Bump Version and Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Bump versions
        id: bump
        run: |
          python scripts/bump-and-publish.py ${{ inputs.bump_type }} --bump-only

          # Get the new version for the commit message
          NEW_VERSION=$(grep -m1 'version = ' packages/common/pyproject.toml | cut -d'"' -f2)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/pyproject.toml packages/vscode-bridge-drop/package.json
          git commit -m "${{ steps.bump.outputs.new_version }}"
          git push

      - name: Build VS Code extension (devs-bridge-drop.vsix)
        run: ./scripts/build-extension.sh

      - name: Build packages
        run: |
          for pkg in packages/common packages/cli packages/webhook packages/webadmin; do
            echo "Building $pkg..."
            cd $pkg
            rm -rf dist/
            python -m build
            cd ../..
          done

      - name: Publish devs-common to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/common/dist/

      - name: Publish devs-cli to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/cli/dist/

      - name: Publish devs-webhook to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/webhook/dist/

      - name: Publish devs-webadmin to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/webadmin/dist/

      - name: Publish extension to VS Code Marketplace
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT secret not set — skipping Marketplace publish."
            echo "To enable: create an Azure DevOps PAT with Marketplace > Manage scope and add it as repo secret VSCE_PAT."
            exit 0
          fi
          VSIX=packages/common/devs_common/templates/extensions/devs-bridge-drop.vsix
          npx --yes @vscode/vsce publish --packagePath "$VSIX" --pat "$VSCE_PAT"

      - name: Create GitHub release with .vsix asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump.outputs.new_version }}"
          TAG="v${VERSION}"
          VSIX=packages/common/devs_common/templates/extensions/devs-bridge-drop.vsix
          if [ ! -f "$VSIX" ]; then
            echo "ERROR: $VSIX not found — build-extension.sh did not run as expected" >&2
            exit 1
          fi
          gh release create "$TAG" \
            --title "$TAG" \
            --notes "Automated release for v${VERSION}. Includes devs-bridge-drop.vsix." \
            "$VSIX"

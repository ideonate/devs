<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devs Web Admin</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .app {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .refresh-btn {
            background: none;
            border: 1px solid #334155;
            color: #94a3b8;
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .refresh-btn:hover { border-color: #64748b; color: #e2e8f0; }

        /* Start form */
        .start-form {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1.25rem;
            margin-bottom: 2rem;
            display: flex;
            gap: 0.75rem;
            align-items: flex-end;
            flex-wrap: wrap;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
            flex: 1;
            min-width: 180px;
        }

        .field label {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .field input {
            background: #0f172a;
            border: 1px solid #334155;
            color: #e2e8f0;
            padding: 0.5rem 0.75rem;
            border-radius: 6px;
            font-size: 0.9rem;
        }
        .field input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .field input::placeholder { color: #475569; }

        .btn {
            padding: 0.5rem 1.25rem;
            border: none;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 500;
            white-space: nowrap;
        }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover:not(:disabled) { background: #2563eb; }

        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover:not(:disabled) { background: #dc2626; }

        .btn-warning { background: #f59e0b; color: #000; }
        .btn-warning:hover:not(:disabled) { background: #d97706; }

        .btn-secondary { background: #6366f1; color: #fff; }
        .btn-secondary:hover:not(:disabled) { background: #4f46e5; }

        .btn-outline {
            background: none;
            border: 1px solid #475569;
            color: #94a3b8;
        }
        .btn-outline:hover:not(:disabled) { border-color: #94a3b8; color: #e2e8f0; }

        .btn-sm {
            padding: 0.3rem 0.7rem;
            font-size: 0.8rem;
        }

        /* Container list */
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .count-badge {
            background: #334155;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 400;
        }

        .container-list {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .container-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 1rem 1.25rem;
        }

        .container-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .container-info {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            min-width: 0;
            flex: 1;
        }

        .container-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .container-meta {
            font-size: 0.8rem;
            color: #94a3b8;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 0.3rem;
        }
        .status-running { background: #22c55e; }
        .status-exited { background: #ef4444; }
        .status-other { background: #f59e0b; }

        .container-actions {
            display: flex;
            gap: 0.4rem;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #64748b;
        }

        /* Tunnel panel */
        .tunnel-panel {
            margin-top: 0.75rem;
            padding-top: 0.75rem;
            border-top: 1px solid #334155;
        }

        .tunnel-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .tunnel-status {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .tunnel-link {
            font-size: 0.8rem;
            color: #60a5fa;
            text-decoration: none;
        }
        .tunnel-link:hover { text-decoration: underline; }

        /* Auth modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 2rem;
            max-width: 480px;
            width: 90%;
        }

        .modal h2 {
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .modal p {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 0.75rem;
            line-height: 1.5;
        }

        .device-code {
            font-family: monospace;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: #f0abfc;
            background: #0f172a;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            text-align: center;
            margin: 1rem 0;
            user-select: all;
        }

        .modal-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: 1.25rem;
            justify-content: flex-end;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-size: 0.9rem;
            z-index: 100;
            animation: slideIn 0.2s ease;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .toast-close {
            background: none;
            border: none;
            color: inherit;
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0 0.1rem;
            opacity: 0.7;
            line-height: 1;
        }
        .toast-close:hover { opacity: 1; }
        .toast-success { background: #166534; color: #bbf7d0; }
        .toast-error { background: #991b1b; color: #fecaca; }

        @keyframes slideIn {
            from { transform: translateY(1rem); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 0.3rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
<div id="app">
    <div class="app">
        <header>
            <h1>Devs Web Admin</h1>
            <button class="refresh-btn" @click="loadContainers" :disabled="loading">
                {{ loading ? 'Loading...' : 'Refresh' }}
            </button>
        </header>

        <!-- Start container form -->
        <div class="start-form">
            <div class="field">
                <label>Repository (org/repo)</label>
                <input v-model="startRepo" placeholder="e.g. ideonate/devs"
                       @keydown.enter="startContainer">
            </div>
            <div class="field">
                <label>Dev Name</label>
                <input v-model="startDevName" placeholder="e.g. sally"
                       @keydown.enter="startContainer">
            </div>
            <button class="btn btn-primary" @click="startContainer"
                    :disabled="!startRepo || !startDevName || starting">
                <span v-if="starting" class="spinner"></span>
                {{ starting ? 'Starting...' : 'Start' }}
            </button>
        </div>

        <!-- Container list -->
        <div class="section-title">
            Containers
            <span class="count-badge">{{ containers.length }}</span>
        </div>

        <div v-if="containers.length === 0 && !loading" class="empty-state">
            No containers running. Start one above.
        </div>

        <div class="container-list">
            <div v-for="c in containers" :key="c.container_id" class="container-card">
                <div class="container-row">
                    <div class="container-info">
                        <div class="container-name">
                            <span class="status-dot"
                                  :class="c.status === 'running' ? 'status-running' : c.status === 'exited' ? 'status-exited' : 'status-other'">
                            </span>
                            {{ c.dev_name }}
                        </div>
                        <div class="container-meta">
                            <span>{{ c.project_name }}</span>
                            <span>{{ c.status }}</span>
                            <span>{{ c.mode }}</span>
                            <span v-if="c.created">{{ formatDate(c.created) }}</span>
                        </div>
                    </div>
                    <div class="container-actions">
                        <button v-if="c.status !== 'running'" class="btn btn-primary btn-sm"
                                @click="restartContainer(c)"
                                :disabled="actionInProgress[c.container_id]">
                            <span v-if="actionInProgress[c.container_id]" class="spinner"></span>
                            Start
                        </button>
                        <button v-if="c.status === 'running'" class="btn btn-warning btn-sm"
                                @click="stopContainer(c)"
                                :disabled="actionInProgress[c.container_id]">
                            Stop
                        </button>
                        <button class="btn btn-danger btn-sm"
                                @click="cleanContainer(c)"
                                :disabled="actionInProgress[c.container_id]">
                            Clean
                        </button>
                    </div>
                </div>

                <!-- Tunnel controls (only for running containers) -->
                <div v-if="c.status === 'running'" class="tunnel-panel">
                    <div class="tunnel-row">
                        <span class="tunnel-status">
                            Tunnel:
                            <template v-if="tunnelState[c.name]?.running">running</template>
                            <template v-else>off</template>
                        </span>

                        <template v-if="tunnelState[c.name]?.running">
                            <a v-if="tunnelState[c.name]?.web_url"
                               :href="tunnelState[c.name].web_url"
                               target="_blank" class="tunnel-link">
                                Open in browser
                            </a>
                            <button v-if="tunnelState[c.name]?.tunnel_name"
                                    class="btn btn-outline btn-sm"
                                    @click="copyVscodeCommand(c)"
                                    :title="getVscodeCommand(c)">
                                {{ copied === c.name ? 'Copied!' : 'VS Code cmd' }}
                            </button>
                            <button class="btn btn-outline btn-sm"
                                    @click="tunnelKill(c)"
                                    :disabled="actionInProgress['tunnel-'+c.name]">
                                Kill tunnel
                            </button>
                        </template>

                        <template v-else>
                            <button class="btn btn-secondary btn-sm"
                                    @click="tunnelStart(c)"
                                    :disabled="actionInProgress['tunnel-'+c.name]">
                                <span v-if="actionInProgress['tunnel-'+c.name]" class="spinner"></span>
                                Start tunnel
                            </button>
                        </template>
                    </div>
                </div>
            </div>
        </div>

        <!-- Auth modal -->
        <div v-if="authModal" class="modal-overlay" @click.self="closeAuthModal">
            <div class="modal">
                <h2>Tunnel Authentication</h2>

                <template v-if="authModal.status === 'starting'">
                    <p><span class="spinner"></span> Starting authentication...</p>
                </template>

                <template v-else-if="authModal.status === 'waiting_for_browser'">
                    <p>Open the link below and enter this code:</p>
                    <div class="device-code">{{ authModal.device_code }}</div>
                    <p>
                        <a :href="authModal.device_url" target="_blank" class="tunnel-link">
                            {{ authModal.device_url }}
                        </a>
                    </p>
                    <p style="color: #64748b; font-size: 0.8rem;">
                        <span class="spinner"></span>
                        Waiting for you to complete authentication in the browser...
                    </p>
                </template>

                <template v-else-if="authModal.status === 'authenticated'">
                    <p style="color: #bbf7d0;">Authentication successful! You can now start a tunnel.</p>
                </template>

                <template v-else-if="authModal.status === 'already_authenticated'">
                    <p style="color: #bbf7d0;">Already authenticated. You can start a tunnel.</p>
                </template>

                <template v-else>
                    <p style="color: #fecaca;">{{ authModal.message || 'Authentication failed.' }}</p>
                </template>

                <div class="modal-actions">
                    <button class="btn btn-outline btn-sm" @click="closeAuthModal">Close</button>
                </div>
            </div>
        </div>

        <!-- Toast -->
        <div v-if="toast" class="toast" :class="'toast-' + toast.type">
            <span>{{ toast.message }}</span>
            <button class="toast-close" @click="toast = null">&times;</button>
        </div>
    </div>
</div>

<script>
const { createApp, ref, reactive, onMounted, onUnmounted } = Vue;

createApp({
    setup() {
        const containers = ref([]);
        const loading = ref(false);
        const starting = ref(false);
        const startRepo = ref('');
        const startDevName = ref('');
        const toast = ref(null);
        const actionInProgress = reactive({});
        const tunnelState = reactive({});  // container_name -> { running, web_url, tunnel_name }
        const authModal = ref(null);

        const copied = ref(null);
        let copiedTimer = null;
        let toastTimer = null;
        let authPollTimer = null;

        function showToast(message, type = 'success') {
            if (toastTimer) clearTimeout(toastTimer);
            toast.value = { message, type };
            if (type === 'error') {
                console.error('[devs-webadmin]', message);
            } else {
                console.log('[devs-webadmin]', message);
            }
            const duration = type === 'error' ? 0 : 3000;
            if (duration > 0) {
                toastTimer = setTimeout(() => { toast.value = null; }, duration);
            }
        }

        async function loadContainers() {
            loading.value = true;
            try {
                const res = await fetch('/api/containers');
                if (!res.ok) throw new Error(await res.text());
                const data = await res.json();
                containers.value = data.containers;

                // Check tunnel status for running containers
                for (const c of data.containers) {
                    if (c.status === 'running') {
                        checkTunnelStatus(c);
                    }
                }
            } catch (e) {
                showToast('Failed to load containers: ' + e.message, 'error');
            } finally {
                loading.value = false;
            }
        }

        async function checkTunnelStatus(c) {
            try {
                const params = new URLSearchParams({
                    project_name: c.project_name,
                    dev_name: c.dev_name,
                });
                const res = await fetch(`/api/tunnel/status?${params}`);
                if (res.ok) {
                    const data = await res.json();
                    tunnelState[c.name] = {
                        running: data.running,
                        web_url: data.web_url || null,
                        tunnel_name: data.tunnel_name,
                    };
                }
            } catch (e) {
                // Silently ignore status check failures
            }
        }

        async function startContainer() {
            if (!startRepo.value || !startDevName.value) return;
            starting.value = true;
            try {
                const res = await fetch('/api/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        repo: startRepo.value,
                        dev_name: startDevName.value,
                    }),
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Start failed');
                }
                showToast(`Started ${startDevName.value} for ${startRepo.value}`);
                startDevName.value = '';
                await loadContainers();
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                starting.value = false;
            }
        }

        async function restartContainer(c) {
            actionInProgress[c.container_id] = true;
            try {
                const res = await fetch('/api/restart', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ container_name: c.name }),
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Start failed');
                }
                showToast(`Started ${c.dev_name}`);
                await loadContainers();
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                delete actionInProgress[c.container_id];
            }
        }

        async function stopContainer(c) {
            actionInProgress[c.container_id] = true;
            try {
                const res = await fetch('/api/stop', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ container_name: c.name }),
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Stop failed');
                }
                showToast(`Stopped ${c.dev_name}`);
                await loadContainers();
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                delete actionInProgress[c.container_id];
            }
        }

        async function cleanContainer(c) {
            actionInProgress[c.container_id] = true;
            try {
                const res = await fetch('/api/clean', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ container_name: c.name }),
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Clean failed');
                }
                showToast(`Cleaned ${c.dev_name}`);
                await loadContainers();
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                delete actionInProgress[c.container_id];
            }
        }

        // --- Tunnel ---

        async function tunnelStart(c) {
            const key = 'tunnel-' + c.name;
            actionInProgress[key] = true;
            try {
                const res = await fetch('/api/tunnel/start', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project_name: c.project_name, dev_name: c.dev_name }),
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Tunnel start failed');
                }
                const data = await res.json();

                if (data.status === 'running') {
                    tunnelState[c.name] = {
                        running: true,
                        web_url: data.web_url,
                        tunnel_name: data.tunnel_name,
                    };
                    showToast(`Tunnel running for ${c.dev_name}`);
                } else if (data.status === 'auth_required') {
                    // Auto-trigger auth flow, then retry tunnel start
                    tunnelAuth(c, { autoStartAfter: true });
                    return;
                } else {
                    showToast('Tunnel may still be starting, check status', 'error');
                }
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                delete actionInProgress[key];
            }
        }

        async function tunnelKill(c) {
            const key = 'tunnel-' + c.name;
            actionInProgress[key] = true;
            try {
                const res = await fetch('/api/tunnel/kill', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project_name: c.project_name, dev_name: c.dev_name }),
                });
                if (res.ok) {
                    delete tunnelState[c.name];
                    showToast(`Tunnel killed for ${c.dev_name}`);
                }
            } catch (e) {
                showToast(e.message, 'error');
            } finally {
                delete actionInProgress[key];
            }
        }

        async function tunnelAuth(c, opts = {}) {
            const key = 'tunnel-' + c.name;
            actionInProgress[key] = true;
            authModal.value = { status: 'starting', containerName: c.name };

            try {
                const res = await fetch('/api/tunnel/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ project_name: c.project_name, dev_name: c.dev_name }),
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Auth failed');
                }
                const data = await res.json();
                authModal.value = { ...data, containerName: c.name };

                if (data.status === 'waiting_for_browser') {
                    // Poll for completion, auto-start tunnel after if requested
                    startAuthPoll(c, opts.autoStartAfter);
                } else if (data.status === 'already_authenticated' && opts.autoStartAfter) {
                    authModal.value = null;
                    tunnelStart(c);
                }
            } catch (e) {
                authModal.value = { status: 'error', message: e.message };
            } finally {
                delete actionInProgress[key];
            }
        }

        function startAuthPoll(c, autoStartAfter) {
            const containerName = c.name;
            if (authPollTimer) clearInterval(authPollTimer);
            authPollTimer = setInterval(async () => {
                try {
                    const params = new URLSearchParams({
                        project_name: c.project_name,
                        dev_name: c.dev_name,
                    });
                    const res = await fetch(`/api/tunnel/auth/status?${params}`);
                    if (!res.ok) return;
                    const data = await res.json();

                    if (data.status === 'authenticated') {
                        stopAuthPoll();
                        if (autoStartAfter) {
                            authModal.value = null;
                            showToast('Authenticated! Starting tunnel...');
                            tunnelStart(c);
                        } else {
                            authModal.value = { status: 'authenticated', containerName };
                            showToast('Tunnel authenticated!');
                        }
                    } else if (data.status === 'failed' || data.status === 'no_pending_auth') {
                        if (authModal.value?.status === 'waiting_for_browser') {
                            authModal.value = {
                                status: 'error',
                                message: data.message || 'Auth session ended',
                                containerName,
                            };
                        }
                        stopAuthPoll();
                    }
                } catch (e) {
                    // ignore poll errors
                }
            }, 2000);
        }

        function stopAuthPoll() {
            if (authPollTimer) {
                clearInterval(authPollTimer);
                authPollTimer = null;
            }
        }

        function closeAuthModal() {
            stopAuthPoll();
            authModal.value = null;
        }

        function getVscodeCommand(c) {
            const tunnelName = tunnelState[c.name]?.tunnel_name;
            if (!tunnelName) return '';
            const workspacePath = `/workspaces/${c.project_name}-${c.dev_name}`;
            return `code --remote tunnel+${tunnelName} ${workspacePath}`;
        }

        async function copyVscodeCommand(c) {
            const cmd = getVscodeCommand(c);
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(cmd);
                } else {
                    // Fallback for non-HTTPS contexts
                    const ta = document.createElement('textarea');
                    ta.value = cmd;
                    ta.style.position = 'fixed';
                    ta.style.opacity = '0';
                    document.body.appendChild(ta);
                    ta.select();
                    document.execCommand('copy');
                    document.body.removeChild(ta);
                }
                if (copiedTimer) clearTimeout(copiedTimer);
                copied.value = c.name;
                copiedTimer = setTimeout(() => { copied.value = null; }, 2000);
            } catch (e) {
                showToast('Failed to copy to clipboard', 'error');
            }
        }

        function formatDate(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            return d.toLocaleString();
        }

        onMounted(() => { loadContainers(); });
        onUnmounted(() => { stopAuthPoll(); });

        return {
            containers, loading, starting,
            startRepo, startDevName,
            toast, actionInProgress,
            tunnelState, authModal, copied,
            loadContainers, startContainer,
            restartContainer, stopContainer, cleanContainer,
            tunnelStart, tunnelKill,
            copyVscodeCommand, getVscodeCommand,
            closeAuthModal, formatDate,
        };
    }
}).mount('#app');
</script>
</body>
</html>
